<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Red Cross Intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://js.arcgis.com/4.32/esri/themes/light/main.css" />
<style>
  :root {
    --bg: #f0f2f5;
    --panel: #ffffff;
    --panel2: #f8fafc;
    --fg: #0f172a;
    --fg2: #334155;
    --muted: #64748b;
    --dim: #94a3b8;
    --red: #ED1B2E;
    --red-dim: rgba(237,27,46,0.06);
    --red-soft: rgba(237,27,46,0.10);
    --red-outline: #c41120;
    --border: #e2e8f0;
    --accent: #1d4ed8;
    --amber: #92400e;
    --ok: #16a34a;
    --overlay: rgba(255,255,255,0.97);
    --overlay-border: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --county-outline: rgba(30,30,30,0.3);
    --shadow: 0 1px 3px rgba(50,50,93,0.08), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(50,50,93,0.10), 0 2px 4px rgba(0,0,0,0.04);
  }
  [data-theme="dark"] {
    --bg: #0f172a; --panel: #1e293b; --panel2: #334155;
    --fg: #f1f5f9; --fg2: #cbd5e1; --muted: #94a3b8; --dim: #64748b;
    --red-dim: rgba(237,27,46,0.15); --red-soft: rgba(237,27,46,0.18);
    --border: rgba(255,255,255,0.1);
    --accent: #60a5fa; --amber: #f59e0b; --ok: #34d399;
    --overlay: rgba(30,41,59,0.96); --overlay-border: rgba(255,255,255,0.1);
    --input-bg: rgba(255,255,255,0.06); --county-outline: rgba(255,255,255,0.22);
    --shadow: 0 1px 3px rgba(0,0,0,0.3); --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; margin: 0; }
  html, body {
    margin: 0; height: 100%; background: var(--bg); color: var(--fg);
    font: 15px/1.6 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased; overflow: hidden;
  }

  /* ───── Grid: full-width map until scope selected ─────────────────────── */
  #app {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: 64px 1fr;
    grid-template-areas: "header" "map";
    height: 100vh;
  }
  #app.has-scope {
    grid-template-columns: 400px 1fr;
    grid-template-areas: "header header" "rail map";
    transition: grid-template-columns 0.25s ease;
  }
  #app.has-scope.rail-collapsed {
    grid-template-columns: 0px 1fr;
  }
  #app.has-scope.rail-collapsed aside#rail { overflow: hidden; padding: 0; border: 0; }

  .rail-toggle {
    position: absolute; top: 50%; left: 0; z-index: 25;
    transform: translateY(-50%);
    width: 28px; height: 56px;
    background: var(--panel); border: 1px solid var(--border);
    border-left: 0; border-radius: 0 8px 8px 0;
    box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--fg2); font-size: 16px;
    transition: all .15s;
  }
  .rail-toggle:hover { color: var(--red); background: var(--red-dim); }
  .rail-collapsed .rail-toggle { left: 0; }
  #app:not(.has-scope) .rail-toggle { display: none; }

  /* ───── Header ──────────────────────────────────────────────────────────── */
  header#top {
    grid-area: header; background: var(--panel);
    border-bottom: 1px solid var(--border); box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 20px;
    padding: 0 28px; position: relative; z-index: 20;
  }
  .brand { font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 10px; color: var(--fg); letter-spacing: -0.3px; }
  .brand .rc { color: var(--red); }
  .brand .pulse { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--red); animation: pulse 2.5s ease-in-out infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(237,27,46,0.5)} 50%{box-shadow:0 0 0 8px rgba(237,27,46,0)} }
  .sep { flex: 1; }
  .scope-row { display: flex; gap: 10px; align-items: center; }
  .type-tabs { display: inline-flex; background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .type-tabs button { background: transparent; color: var(--muted); border: 0; padding: 8px 16px; font: 600 13px/1 inherit; letter-spacing: 0.3px; text-transform: uppercase; cursor: pointer; transition: all .15s; }
  .type-tabs button.active { background: var(--red); color: #fff; }
  .type-tabs button:hover:not(.active) { color: var(--fg); background: rgba(0,0,0,0.03); }
  .combo { position: relative; }
  .combo input { background: var(--input-bg); color: var(--fg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 16px; font: inherit; font-size: 15px; width: 320px; transition: border-color .15s, box-shadow .15s; }
  .combo input:focus { outline: none; border-color: var(--red); box-shadow: 0 0 0 3px var(--red-dim); }
  .combo-panel { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; max-height: 380px; overflow-y: auto; z-index: 100; box-shadow: var(--shadow-md); }
  .combo-option { padding: 12px 18px; cursor: pointer; font-size: 15px; font-weight: 500; border-bottom: 1px solid var(--border); transition: background .1s; color: var(--fg); }
  .combo-option:last-child { border-bottom: 0; }
  .combo-option:hover, .combo-option.active { background: var(--red-dim); }
  .combo-option .muted { color: var(--muted); font-size: 13px; margin-left: 8px; font-weight: 400; }
  .combo-empty { padding: 16px 18px; color: var(--muted); font-size: 14px; }
  .icon-btn { background: var(--panel); border: 1px solid var(--border); color: var(--fg2); border-radius: 8px; padding: 8px 16px; font: 600 13px/1 inherit; cursor: pointer; transition: all .15s; }
  .icon-btn:hover { color: var(--fg); border-color: var(--red); background: var(--red-dim); }

  /* ───── Report panel (left side) ────────────────────────────────────────── */
  aside#rail {
    grid-area: rail; background: var(--bg);
    border-right: 1px solid var(--border);
    display: none; flex-direction: column; overflow: hidden;
  }
  #app.has-scope aside#rail { display: flex; }

  /* ───── Scope header in sidebar ─────────────────────────────────────────── */
  .scope-header { padding: 20px 20px 0; background: var(--panel); border-bottom: 1px solid var(--border); padding-bottom: 16px; flex-shrink: 0; }
  .scope-badge { display: inline-block; background: var(--red); color: #fff; font: 700 10px/1 inherit; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .scope-name-display { font: 800 17px/1.3 inherit; color: var(--fg); margin-top: 8px; letter-spacing: -0.2px; }

  /* ───── Tab bar ─────────────────────────────────────────────────────────── */
  .tab-bar {
    display: flex; gap: 6px; padding: 16px 20px;
    background: var(--panel); border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow); flex-shrink: 0;
  }
  .tab {
    flex: 1; padding: 14px 16px; font: 700 14px/1 inherit;
    border: 2px solid var(--border); background: var(--panel);
    color: var(--fg2); cursor: pointer; border-radius: 10px;
    text-align: center; transition: all .15s; letter-spacing: -0.1px;
  }
  .tab:hover:not(.active) { border-color: var(--red); color: var(--fg); background: var(--red-dim); }
  .tab.active { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 2px 8px rgba(237,27,46,0.25); }

  /* ───── Tab panels ──────────────────────────────────────────────────────── */
  .tab-panel { display: flex; flex-direction: column; gap: 16px; padding: 20px; flex: 1; overflow-y: auto; }
  .tab-panel[hidden] { display: none; }

  /* ───── KPI card grid ───────────────────────────────────────────────────── */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .kpi-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; box-shadow: var(--shadow);
  }
  .kpi-card.full-width { grid-column: 1 / -1; }
  .kpi-label { font-size: 11px; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; line-height: 1; }
  .kpi-value { font: 800 28px/1 inherit; color: var(--fg); margin-top: 8px; letter-spacing: -0.5px; }
  .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 6px; font-weight: 500; line-height: 1; }

  /* ───── Content cards ───────────────────────────────────────────────────── */
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; box-shadow: var(--shadow);
  }
  .card h3 {
    margin: 0 0 16px; font-size: 14px; color: var(--fg2);
    text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
  }
  .card h3 .dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; flex-shrink: 0; }

  /* ───── Briefing ────────────────────────────────────────────────────────── */
  #briefing { font-size: 15px; line-height: 1.75; color: var(--fg2); font-weight: 400; }
  #briefing.loading { color: var(--muted); font-style: italic; }
  #briefing .shimmer { display: inline-block; width: 80%; height: 14px; background: linear-gradient(90deg,rgba(0,0,0,0.04) 0%,rgba(0,0,0,0.08) 50%,rgba(0,0,0,0.04) 100%); background-size: 200% 100%; animation: sh 1.6s infinite; border-radius: 4px; margin-top: 6px; }
  @keyframes sh { to { background-position: -200% 0; } }

  /* ───── Metric selector (inside Counties tab) ───────────────────────────── */
  .metric-selector { display: flex; flex-wrap: wrap; gap: 6px; }
  .map-chip {
    background: var(--panel); border: 1px solid var(--border); color: var(--fg2);
    padding: 9px 16px; border-radius: 8px; font: 600 12px/1 inherit;
    letter-spacing: 0.2px; text-transform: uppercase; cursor: pointer;
    transition: all .15s; box-shadow: var(--shadow);
  }
  .map-chip:hover:not(.active) { border-color: var(--red); color: var(--fg); }
  .map-chip.active { background: var(--red); border-color: var(--red); color: #fff; box-shadow: 0 2px 8px rgba(237,27,46,0.2); }

  /* ───── Top 5 ───────────────────────────────────────────────────────────── */
  #top5 { display: flex; flex-direction: column; gap: 4px; }
  .top5-row { display: grid; grid-template-columns: 32px 1fr auto; gap: 12px; align-items: center; padding: 14px 16px; border-radius: 10px; cursor: pointer; transition: background 0.12s; }
  .top5-row:hover { background: var(--red-dim); }
  .top5-row.active { background: var(--red-dim); }
  .top5-rank { color: var(--muted); font-size: 16px; font-weight: 800; text-align: center; }
  .top5-name { font-size: 16px; color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
  .top5-name .state { color: var(--muted); font-weight: 400; }
  .top5-val { font: 700 14px/1 ui-monospace,"SF Mono",Menlo,monospace; color: var(--amber); background: rgba(146,64,14,0.08); padding: 7px 14px; border-radius: 8px; min-width: 52px; text-align: center; }

  /* ───── Chat ────────────────────────────────────────────────────────────── */
  .chat-card { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  .chat-card h3 { flex-shrink: 0; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 12px; flex-shrink: 0; }
  .suggestion { background: var(--panel2); border: 1px solid var(--border); color: var(--fg2); border-radius: 20px; padding: 8px 16px; font: 500 13px/1.3 inherit; cursor: pointer; transition: all .15s; }
  .suggestion:hover { border-color: var(--red); background: var(--red-dim); color: var(--fg); }
  #messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  .msg { padding: 14px 18px; border-radius: 12px; line-height: 1.6; font-size: 15px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { background: var(--red-dim); border: 1px solid rgba(237,27,46,0.12); align-self: flex-end; max-width: 88%; color: var(--fg); }
  .msg.bot { background: var(--panel2); border: 1px solid var(--border); color: var(--fg2); }
  .msg.bot.pending { color: var(--muted); font-style: italic; }
  .msg code { background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 4px; font-size: 14px; font-family: ui-monospace,"SF Mono",Menlo,monospace; }
  .msg pre { background: rgba(0,0,0,0.03); padding: 12px; border-radius: 8px; overflow: auto; font-size: 14px; margin: 8px 0; border: 1px solid var(--border); }
  .msg strong { color: var(--fg); }
  .md-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
  .md-table th { background: var(--panel2); font-weight: 700; text-align: left; padding: 8px 10px; border: 1px solid var(--border); color: var(--fg); font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; }
  .md-table td { padding: 6px 10px; border: 1px solid var(--border); color: var(--fg2); }
  .md-table tbody tr:hover { background: var(--red-dim); }
  .md-h { color: var(--fg); margin: 14px 0 6px; letter-spacing: -0.2px; }
  h3.md-h { font-size: 15px; } h4.md-h { font-size: 14px; } h5.md-h { font-size: 13px; } h6.md-h { font-size: 13px; }
  #askForm { display: flex; gap: 8px; padding-top: 14px; border-top: 1px solid var(--border); flex-shrink: 0; margin-top: auto; }
  #askForm textarea { flex: 1; background: var(--input-bg); color: var(--fg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font: 15px/1.4 inherit; resize: none; min-height: 44px; max-height: 100px; }
  #askForm textarea:focus { outline: none; border-color: var(--red); box-shadow: 0 0 0 3px var(--red-dim); }
  #askForm button.send { background: var(--red); color: #fff; border: 0; border-radius: 10px; padding: 0 22px; font: 700 18px/1 inherit; cursor: pointer; transition: background .15s; }
  #askForm button.send:hover { background: #d41628; }
  #askForm button.send:disabled { opacity: 0.4; cursor: progress; }

  /* ───── Map ──────────────────────────────────────────────────────────────── */
  main#mapwrap { grid-area: map; position: relative; background: var(--bg); }
  #map { position: absolute; inset: 0; }
  .legend { position: absolute; bottom: 20px; left: 20px; background: var(--overlay); backdrop-filter: blur(12px); border: 1px solid var(--overlay-border); border-radius: 12px; padding: 16px 20px; z-index: 10; font-size: 13px; color: var(--muted); min-width: 200px; box-shadow: var(--shadow-md); }
  .legend h4 { margin: 0 0 8px; font-size: 12px; color: var(--fg); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; }
  .legend .bar { display: flex; gap: 2px; margin: 6px 0; }
  .legend .bar div { flex: 1; height: 14px; border-radius: 3px; }
  .legend .labels { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
  .map-controls { position: absolute; bottom: 20px; right: 20px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
  .ctrl-btn { width: 44px; height: 44px; border-radius: 10px; background: var(--overlay); backdrop-filter: blur(12px); border: 1px solid var(--overlay-border); color: var(--fg2); display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; transition: all .15s; box-shadow: var(--shadow); }
  .ctrl-btn:hover { border-color: var(--red); color: var(--red); transform: scale(1.05); }
  .ctrl-btn svg { width: 20px; height: 20px; }
  .ctrl-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
  .basemap-panel { position: absolute; bottom: 20px; right: 72px; z-index: 11; background: var(--overlay); backdrop-filter: blur(12px); border: 1px solid var(--overlay-border); border-radius: 12px; box-shadow: var(--shadow-md); padding: 16px; min-width: 200px; }
  .basemap-panel h4 { margin: 0 0 10px; font-size: 12px; color: var(--fg2); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }
  .bm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .bm-opt { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 0; cursor: pointer; overflow: hidden; display: flex; flex-direction: column; text-align: center; transition: border-color .15s; }
  .bm-opt:hover { border-color: var(--red); }
  .bm-opt.active { border-color: var(--red); box-shadow: 0 0 0 1px var(--red) inset; }
  .bm-thumb { height: 40px; width: 100%; display: block; }
  .bm-label { font: 600 10px/1.2 inherit; color: var(--fg2); padding: 6px 4px; letter-spacing: 0.3px; text-transform: uppercase; background: var(--panel2); }
  .bm-opt.active .bm-label { color: var(--red); }

  /* ───── Loading ──────────────────────────────────────────────────────────── */
  .dimmer { position: absolute; inset: 0; background: rgba(240,242,245,0.6); display: flex; align-items: center; justify-content: center; z-index: 5; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  [data-theme="dark"] .dimmer { background: rgba(15,23,42,0.6); }
  .dimmer.on { opacity: 1; }
  .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Hide ArcGIS popup — county detail goes in sidebar */
  .esri-popup { display: none !important; }

  /* ───── County detail tab content ───────────────────────────────────────── */
  .county-header h2 { font: 800 18px/1.2 inherit; color: var(--fg); margin-bottom: 2px; letter-spacing: -0.3px; }
  .county-chapter { color: var(--muted); font-size: 13px; font-weight: 500; }
  .hazard-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .hazard-row:last-child { border-bottom: 0; }
  .hazard-name { font: 600 13px/1 inherit; color: var(--fg2); min-width: 90px; }
  .hazard-bar-track { flex: 1; height: 10px; background: var(--panel2); border-radius: 5px; overflow: hidden; border: 1px solid var(--border); }
  .hazard-bar-fill { height: 100%; background: linear-gradient(90deg, #feb24c, #e31a1c); border-radius: 5px; }
  .hazard-score { font: 700 14px/1 ui-monospace,monospace; color: var(--fg); min-width: 28px; text-align: right; }
  .kpi-unit { font-size: 14px; color: var(--muted); font-weight: 500; }
  .kpi-grid-3 { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .kpi-sm { padding: 10px 14px; }
  .kpi-sm .kpi-label { font-size: 10px; }
  .kpi-sm .kpi-value { font-size: 20px; margin-top: 4px; }
  .kpi-sm .kpi-sub { font-size: 11px; margin-top: 3px; }
  .kpi-sm .kpi-unit { font-size: 12px; }

  #gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }

  /* ───── Print ────────────────────────────────────────────────────────────── */
  @media print {
    html, body { overflow: visible; height: auto; background: #fff; color: #000; font-size: 14px; }
    #app { display: block; height: auto; overflow: visible; }
    header#top { position: relative; background: #fff; border-bottom: 2px solid #ccc; }
    .brand .pulse { display: none; }
    .brand .rc { color: #c00; }
    #printBtn, #logout, #themeBtn, #basemapBtn, .basemap-panel, .map-controls { display: none !important; }
    aside#rail { border: 0; overflow: visible; background: #fff; }
    .tab-bar { display: none; }
    .tab-panel { display: block !important; overflow: visible; }
    .tab-panel[hidden] { display: block !important; }
    .card { page-break-inside: avoid; border: 1px solid #ddd; box-shadow: none; }
    .kpi-card { box-shadow: none; }
    main#mapwrap { display: none; }
    #askForm, .suggestions { display: none; }
    .msg { border: 1px solid #ddd; background: #f9f9f9; color: #000; }
    .combo-panel { display: none; }
  }

  /* ───── Responsive ──────────────────────────────────────────────────────── */
  @media (max-width: 960px) {
    #app.has-scope { grid-template-columns: 1fr; grid-template-rows: 64px 40vh 1fr; grid-template-areas: "header" "map" "rail"; }
    #app.has-scope aside#rail { border-right: 0; border-top: 1px solid var(--border); overflow-y: auto; }
    .combo input { width: 200px; }
    .scope-row { gap: 6px; }
    .type-tabs button { padding: 6px 10px; font-size: 11px; }
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    .kpi-value { font-size: 22px; }
  }
  @media (max-width: 600px) {
    header#top { padding: 0 12px; gap: 10px; }
    .combo input { width: 140px; font-size: 14px; }
    .kpi-grid { grid-template-columns: 1fr; }
    .kpi-card.full-width { grid-column: 1; }
  }
</style>
</head>
<body>
<div id="gate"><div class="spinner"></div></div>

<div id="app" hidden>
  <header id="top">
    <div class="brand"><span class="pulse"></span><span class="rc">Red Cross</span> Intel</div>
    <div class="scope-row">
      <div class="type-tabs" role="tablist">
        <button data-type="division" class="active">Division</button>
        <button data-type="region">Region</button>
        <button data-type="chapter">Chapter</button>
      </div>
      <div class="combo">
        <input id="scopeNameInput" type="text" placeholder="Loading…" autocomplete="off" spellcheck="false" />
        <div id="scopeNamePanel" class="combo-panel" hidden></div>
      </div>
    </div>
    <div class="sep"></div>
    <button class="icon-btn" id="printBtn" title="Print / Save PDF">Print</button>
    <button class="icon-btn" id="logout">Sign out</button>
  </header>

  <aside id="rail">
    <div class="scope-header" id="scopeHeader">
      <span class="scope-badge" id="scopeBadge"></span>

function mdToHtml(md) {
  if (!md) return "";
  const esc = (s) => s.replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
  // Split into lines, process tables as blocks, then inline formatting
  const lines = md.split("\n");
  const blocks = [];
  let i = 0;
  while (i < lines.length) {
    // Detect table: line with pipes, followed by separator row (|---|)
    if (lines[i].trim().startsWith("|") && i + 1 < lines.length && /^\|[\s\-:|]+\|$/.test(lines[i+1].trim())) {
      const headerCells = lines[i].split("|").filter((_, j, a) => j > 0 && j < a.length - 1).map(c => esc(c.trim()));
      i += 2; // skip header + separator
      const rows = [];
      while (i < lines.length && lines[i].trim().startsWith("|")) {
        const cells = lines[i].split("|").filter((_, j, a) => j > 0 && j < a.length - 1).map(c => esc(c.trim()));
        rows.push(cells);
        i++;
      }
      let html = '<table class="md-table"><thead><tr>' + headerCells.map(c => `<th>${c}</th>`).join("") + '</tr></thead><tbody>';
      for (const row of rows) html += '<tr>' + row.map(c => `<td>${c}</td>`).join("") + '</tr>';
      html += '</tbody></table>';
      blocks.push(html);
    } else {
      let line = esc(lines[i]);
      line = line.replace(/`([^`]+)`/g, "<code>$1</code>");
      line = line.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      line = line.replace(/\*(.+?)\*/g, "<em>$1</em>");
      // Headers
      if (/^#{1,4}\s/.test(lines[i])) {
        const lvl = lines[i].match(/^(#{1,4})\s/)[1].length;
        const text = line.replace(/^#{1,4}\s+/, "");
        blocks.push(`<h${lvl + 2} class="md-h">${text}</h${lvl + 2}>`);
      } else {
        blocks.push(line);
      }
      i++;
    }
  }
  // Join non-table blocks with <br>, but tables stay as blocks
  let result = "";
  for (const b of blocks) {
    if (b.startsWith("<table") || b.startsWith("<h")) result += b;
    else result += (result && !result.endsWith(">") ? "<br>" : "") + b;
  }
  return result;
}

async function loadScopes() {

const typeTabs = document.querySelectorAll(".type-tabs button");
function setType(t) { typeTabs.forEach(b => b.classList.toggle("active", b.dataset.type === t)); onScopeTypeChange(); }

function renderPanel(q) {
  const qq = (q || "").trim().toLowerCase();
  const matches = qq ? scopeList.map((s, i) => ({ ...s, _i: i })).filter(s => s.name.toLowerCase().includes(qq)) : scopeList.map((s, i) => ({ ...s, _i: i }));
  if (!matches.length) { scopePanel.innerHTML = `<div class="combo-empty">No matches</div>`; scopePanel.hidden = false; activeComboIdx = -1; return; }
  const t = currentType();
  const sub = (s) => t === "chapter" ? ` <span class="muted">· ${s.region || ""}</span>` : t === "region" ? ` <span class="muted">· ${s.division || ""}</span>` : "";
  scopePanel.innerHTML = matches.slice(0, 300).map((s, idx) => `<div class="combo-option${idx===0?" active":""}" data-i="${s._i}">${s.name}${sub(s)}</div>`).join("");
  scopePanel.hidden = false; activeComboIdx = 0;
}
function hidePanel() { scopePanel.hidden = true; activeComboIdx = -1; }
function initScopeUI() {
  onScopeTypeChange();

  scopeInput.addEventListener("input", () => renderPanel(scopeInput.value));
  scopeInput.addEventListener("blur", () => setTimeout(hidePanel, 150));

    if (scopePanel.hidden) return;

    if (e.key === "ArrowDown") { e.preventDefault(); activeComboIdx = Math.min(activeComboIdx+1, opts.length-1); updateActiveOpt(opts); }
    else if (e.key === "ArrowUp") { e.preventDefault(); activeComboIdx = Math.max(activeComboIdx-1, 0); updateActiveOpt(opts); }
    else if (e.key === "Enter") { e.preventDefault(); const el = opts[activeComboIdx]; if (el) pickScope(Number(el.dataset.i)); }
    else if (e.key === "Escape") { hidePanel(); scopeInput.blur(); }

}
function updateActiveOpt(opts) { opts.forEach((el, i) => el.classList.toggle("active", i === activeComboIdx)); opts[activeComboIdx]?.scrollIntoView({ block:"nearest" }); }

function toggleBasemapPanel() { const p = document.getElementById("basemapPanel"); const btn = document.getElementById("basemapBtn"); const showing = !p.hidden; p.hidden = showing; btn.classList.toggle("active", !showing); if (!showing) buildBasemapGrid(); }
function applyTheme(mode) {

function loadArcGIS() {

    script.onerror = reject; document.head.appendChild(script);

  countyData = data;

  // Fallback: zoom to county polygons if scope outline query missed
  if (!didZoom && countyLayer && countyLayer.graphics.length > 0) {

async function fetchCountyData(scope) {

async function renderBriefing(scope) {
  const briefEl = document.getElementById("briefing");
  const key = `intel:brief:v4:${scope.type}:${scope.code || scope.name}`;
  const cached = localStorage.getItem(key);
  if (cached) { briefEl.classList.remove("loading"); briefEl.textContent = cached; return; }
  briefEl.classList.add("loading"); briefEl.innerHTML = "Synthesizing…<div class=\"shimmer\"></div>";
  try {
    const r = await fetch("/api/briefing", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ scope }) });
    const j = await r.json();
    const text = (j.briefing || j.answer || j.error || "").trim();
    briefEl.classList.remove("loading"); briefEl.textContent = text;
    if (j.briefing) localStorage.setItem(key, j.briefing);
  } catch (e) { briefEl.classList.remove("loading"); briefEl.textContent = "Briefing unavailable — try the Ask tab."; }
}

  const { Graphic, SimpleFillSymbol, SimpleLineSymbol, query, Query } = arcgisMods;
  outlineLayer.removeAll();
  const ARC = "https://services.arcgis.com/pGfbNJoYypmNq86F/arcgis/rest/services/Master_ARC_Geography_2022/FeatureServer/";
  const layerByType = { division: "1", region: "2", chapter: "3" };
  const fieldByType = { division: "Division", region: "Region", chapter: "Chapter" };
  const url = ARC + layerByType[scope.type];
  const field = fieldByType[scope.type];
  const esc = (s) => String(s).replace(/'/g, "''");
  const q = new Query({ where: `${field} = '${esc(scope.name)}'`, returnGeometry: true, outFields: ["*"], outSpatialReference: { wkid: 102100 } });
  try {
    const result = await query.executeQueryJSON(url, q);
    if (!result.features.length) return false;
    const sym = new SimpleFillSymbol({ color: [237, 27, 46, 0.08], outline: new SimpleLineSymbol({ color: [237, 27, 46, 0.95], width: 2.5 }) });
    let fullExtent = null;
    for (const f of result.features) {
      outlineLayer.add(new Graphic({ geometry: f.geometry, symbol: sym, attributes: f.attributes }));
      if (f.geometry.extent) fullExtent = fullExtent ? fullExtent.union(f.geometry.extent) : f.geometry.extent.clone();
    }
    if (fullExtent) mapView.goTo(fullExtent.expand(1.1), { duration: 900, easing: "ease-in-out" });
    return true;
  } catch (e) { console.error("outline draw failed", e); return false; }
}

// ───── Choropleth ────────────────────────────────────────────────────────────
async function renderChoropleth() {
  if (!countyData || !arcgisMods) return;
  const { Graphic, SimpleFillSymbol, SimpleLineSymbol, query, Query } = arcgisMods;
  countyLayer.removeAll();
  const fipsByRow = new Map();
  for (const r of countyData.rows || []) { if (r.county_fips) fipsByRow.set(String(r.county_fips).padStart(5, "0"), r); }
  if (!fipsByRow.size) return;
  const COUNTY_URL = "https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/USA_Counties_Generalized_Boundaries/FeatureServer/0";
  const fipsList = [...fipsByRow.keys()].map(x => `'${x}'`).join(",");
  const q = new Query({ where: `FIPS IN (${fipsList})`, returnGeometry: true, outFields: ["FIPS", "NAME", "STATE_NAME"], outSpatialReference: { wkid: 102100 } });
  let result;
  try { result = await query.executeQueryJSON(COUNTY_URL, q); } catch (e) { console.error("county query failed", e); return; }
  const meta = METRIC_META[activeMetric];
  const outlineColor = currentTheme === "light" ? [30, 30, 30, 0.35] : [255, 255, 255, 0.22];
  for (const f of result.features) {
    const fips = String(f.attributes.FIPS).padStart(5, "0");
    const row = fipsByRow.get(fips); if (!row) continue;
    const v = Number(row[activeMetric]);
    const color = valueToColor(v, meta, RAMP);
    const sym = new SimpleFillSymbol({ color, outline: new SimpleLineSymbol({ color: outlineColor, width: 0.5 }) });
    countyLayer.add(new Graphic({ geometry: f.geometry, symbol: sym, attributes: { ...row, __display_name: `${row.county_name}, ${row.state_abbr}` } }));
  }
}
function valueToColor(v, meta, ramp) {
  if (v == null || Number.isNaN(v)) return currentTheme === "light" ? [200, 200, 200, 0.55] : [90, 90, 90, 0.4];
  const t = Math.max(0, Math.min(1, (v - meta.min) / (meta.max - meta.min)));
  const idx = Math.min(ramp.length - 1, Math.floor(t * (ramp.length - 0.001)));
  const hex = ramp[idx];
  const [r, g, b] = [1, 3, 5].map(i => parseInt(hex.substr(i, 2), 16));
  return [r, g, b, 0.88];
}
// ───── County detail in sidebar ──────────────────────────────────────────────
function showCountyDetail(attrs) {
  const tab = document.getElementById("countyTab");
  tab.hidden = false;
  tab.textContent = attrs.county_name || "County";
  document.getElementById("countyDetailContent").innerHTML = buildCountyDetailHTML(attrs);
  showTab("county");
}
function buildCountyDetailHTML(a) {
  const pop = a.population || 0;
  const pplCount = (pct) => pct != null && pop ? fmtNum(Math.round(pop * pct / 100)) : "—";
  const risk = a.risk_score != null ? a.risk_score.toFixed(0) : "—";
  const eal = a.expected_annual_loss != null ? "$" + shortNum(a.expected_annual_loss) : "—";
  const hazards = HAZARD_KEYS.map(k => ({ k, v: a[k] })).filter(x => x.v != null).sort((x, y) => y.v - x.v).slice(0, 5);
  const hazardHTML = hazards.map(x => `<div class="hazard-row"><span class="hazard-name">${HAZARD_PRETTY[x.k]}</span><div class="hazard-bar-track"><div class="hazard-bar-fill" style="width:${x.v}%"></div></div><span class="hazard-score">${x.v.toFixed(0)}</span></div>`).join("");
  return `
    <div class="county-header"><h2>${a.county_name}, ${a.state_abbr}</h2><p class="county-chapter">${a.chapter || "—"}</p></div>
    <div class="kpi-grid kpi-grid-3" style="margin-top:12px;">
      <div class="kpi-card kpi-sm"><div class="kpi-label">Population</div><div class="kpi-value">${fmtNum(pop)}</div></div>
      <div class="kpi-card kpi-sm"><div class="kpi-label">Risk Score</div><div class="kpi-value">${risk}<span class="kpi-unit">/100</span></div></div>
      <div class="kpi-card kpi-sm"><div class="kpi-label">Annual Loss</div><div class="kpi-value">${eal}</div></div>
      <div class="kpi-card kpi-sm"><div class="kpi-label">ALICE</div><div class="kpi-value">${pplCount(a.pct_alice)}</div><div class="kpi-sub">${a.pct_alice != null ? a.pct_alice.toFixed(1) + "%" : ""}</div></div>
      <div class="kpi-card kpi-sm"><div class="kpi-label">Poverty</div><div class="kpi-value">${pplCount(a.poverty_pct)}</div><div class="kpi-sub">${a.poverty_pct != null ? a.poverty_pct.toFixed(1) + "%" : ""}</div></div>
      <div class="kpi-card kpi-sm"><div class="kpi-label">Combined</div><div class="kpi-value">${pplCount(a.pct_struggling)}</div><div class="kpi-sub">${a.pct_struggling != null ? a.pct_struggling.toFixed(1) + "%" : ""}</div></div>
    </div>
    <div style="margin-top:12px;"><div style="font:700 12px/1 inherit;color:var(--fg2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Top Hazards</div>${hazardHTML || "<p style='color:var(--muted)'>No hazard data</p>"}</div>`;
}

// ───── Legend ────────────────────────────────────────────────────────────────
function renderLegend() {
  const meta = METRIC_META[activeMetric]; const ramp = RAMPS[meta.ramp];
  document.getElementById("legend").hidden = false;
  document.getElementById("legendTitle").textContent = meta.label;
  document.getElementById("legendBar").innerHTML = ramp.map(c => `<div style="background:${c}"></div>`).join("");
  document.getElementById("legendLabels").innerHTML = `<span>${meta.fmt(meta.min)}</span><span>${meta.fmt(meta.max)}</span>`;
}

// ───── Top 5 ─────────────────────────────────────────────────────────────────
function renderTop5() {
  if (!countyData) return;
  const meta = METRIC_META[activeMetric];
  document.getElementById("top5MetricLabel").textContent = `by ${meta.label.toLowerCase()}`;
  const rows = [...(countyData.rows || [])].filter(r => r[activeMetric] != null).sort((a, b) => b[activeMetric] - a[activeMetric]).slice(0, 5);
  const host = document.getElementById("top5");
  host.innerHTML = rows.map((r, i) => `<div class="top5-row" data-fips="${r.county_fips}"><div class="top5-rank">${i+1}</div><div class="top5-name">${r.county_name} <span class="state">${r.state_abbr}</span></div><div class="top5-val">${meta.fmt(r[activeMetric])}</div></div>`).join("");
  host.querySelectorAll(".top5-row").forEach(row => { row.addEventListener("click", () => zoomToFips(row.dataset.fips)); });
}
function zoomToFips(fips) {
  if (!countyLayer) return;
  const g = countyLayer.graphics.find(x => String(x.attributes.county_fips).padStart(5,"0") === String(fips).padStart(5,"0"));
  if (!g) return;
  mapView.goTo({ target: g.geometry, zoom: Math.max(mapView.zoom, 8) }, { duration: 700 });
  showCountyDetail(g.attributes);
}

// ───── KPI ───────────────────────────────────────────────────────────────────
function updateKPIs() {
  if (!countyData) return;
  const rows = countyData.rows || [];
  const popTotal = rows.reduce((s, r) => s + (r.population || 0), 0);
  const riskAvg = avg(rows.map(r => r.risk_score));
  const struggAvg = avg(rows.map(r => r.pct_struggling));
  const ealSum = rows.reduce((s, r) => s + (r.expected_annual_loss || 0), 0);
  document.getElementById("kpiCounties").textContent = rows.length;
  document.getElementById("kpiPopulation").textContent = popTotal ? `${fmtNum(popTotal)} people` : "";
  document.getElementById("kpiRisk").textContent = riskAvg != null ? riskAvg.toFixed(0) : "—";
  document.getElementById("kpiStruggling").textContent = struggAvg != null ? struggAvg.toFixed(1) + "%" : "—";
  document.getElementById("kpiEAL").textContent = "$" + shortNum(ealSum);
  const nat = countyData.national || {};
  if (riskAvg != null && nat.p50_risk != null) { const d = riskAvg - nat.p50_risk; document.getElementById("kpiRiskPctl").textContent = `${d >= 0 ? "+" : ""}${d.toFixed(0)} vs US median`; }
  if (struggAvg != null && nat.p50_struggling != null) { const d = struggAvg - nat.p50_struggling; document.getElementById("kpiStrugglingPctl").textContent = `${d >= 0 ? "+" : ""}${d.toFixed(1)}pp vs US median`; }
  const hazAvgs = HAZARD_KEYS.map(k => ({ k, v: avg(rows.map(r => r[k])) })).filter(x => x.v != null);
  hazAvgs.sort((a, b) => b.v - a.v);
  const top = hazAvgs[0];
  if (top) { document.getElementById("kpiHazard").textContent = HAZARD_PRETTY[top.k]; document.getElementById("kpiHazardVal").textContent = `avg ${top.v.toFixed(0)}/100`; }
}
function avg(arr) { const vals = arr.filter(x => x != null && !Number.isNaN(Number(x))).map(Number); return vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null; }

// ───── Chat ──────────────────────────────────────────────────────────────────
function chatKey(scope) { return `intel:chat:v3:${scope.type}:${scope.code || scope.name}`; }
function loadChat(scope) { try { chatHistory = JSON.parse(localStorage.getItem(chatKey(scope)) || "[]"); } catch { chatHistory = []; } renderChat(); }
function saveChat(scope) { localStorage.setItem(chatKey(scope), JSON.stringify(chatHistory.slice(-30))); }
function renderChat() {
  const el = document.getElementById("messages");
  el.innerHTML = chatHistory.map(m => `<div class="msg ${m.role}${m.pending ? " pending" : ""}">${m.role === "user" ? (m.text || "").replace(/</g,"&lt;") : mdToHtml(m.text || "")}</div>`).join("");
  el.scrollTop = el.scrollHeight;
  const sug = document.getElementById("suggestions"); if (sug) sug.hidden = chatHistory.length > 0;
}
function initChat() {
  const form = document.getElementById("askForm"); const q = document.getElementById("q"); const btn = document.getElementById("sendBtn");
  q.addEventListener("input", () => { q.style.height = "auto"; q.style.height = Math.min(100, q.scrollHeight) + "px"; });
  q.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); } });
  form.addEventListener("submit", async (e) => {
    e.preventDefault(); if (!activeScope) return;
    const text = q.value.trim(); if (!text) return;
    q.value = ""; q.style.height = "auto"; btn.disabled = true;
    chatHistory.push({ role:"user", text }); chatHistory.push({ role:"bot", text:"Thinking…", pending:true }); renderChat();
    try {
      const r = await fetch("/api/ask", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ question: text, scope: activeScope }) });
      const j = await r.json(); chatHistory.pop();
      chatHistory.push({ role:"bot", text: r.ok ? (j.answer || "(no answer)") : `Error: ${j.error || r.status}` });
    } catch (x) { chatHistory.pop(); chatHistory.push({ role:"bot", text: "Network error: " + x.message }); }
    saveChat(activeScope); renderChat(); btn.disabled = false;
  });
}
function initSuggestions() { document.querySelectorAll('.suggestion').forEach(btn => { btn.addEventListener('click', () => { document.getElementById('q').value = btn.textContent; document.getElementById('askForm').requestSubmit(); }); }); }

// ───── Accordion compat (now no-ops — replaced by tabs) ─────────────────────
function collapseAccordions() {}
function expandAccordions() { document.querySelectorAll(".tab-panel").forEach(p => { p.hidden = false; p.style.display = "block"; }); }

// ───── Print ────────────────────────────────────────────────────────────────
document.getElementById("printBtn").addEventListener("click", () => { expandAccordions(); setTimeout(() => window.print(), 100); });

// ───── Sidebar toggle ────────────────────────────────────────────────────────
document.getElementById("railToggle").addEventListener("click", () => {
  const app = document.getElementById("app");
  const btn = document.getElementById("railToggle");
  app.classList.toggle("rail-collapsed");
  btn.innerHTML = app.classList.contains("rail-collapsed") ? "&#x25B6;" : "&#x25C0;";
  // Let map resize after transition
  setTimeout(() => { if (mapView) mapView.resize(); }, 300);
});

// ───── Logout ────────────────────────────────────────────────────────────────
function initLogout() { document.getElementById("logout").addEventListener("click", async () => { await fetch("/api/logout", { method:"POST" }); location.href = "/login"; }); }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Red Cross Intel</title>
<style>
  :root {
    --bg:#111; --panel:#181818; --panel2:#1e1e1e; --fg:#f4f4f4; --muted:#8a8a8a;
    --red:#ED1B2E; --border:#2a2a2a; --accent:#4aa3ff;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
  header {
    position:sticky; top:0; z-index:5; background:rgba(17,17,17,0.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;
  }
  .brand { font-weight:700; letter-spacing:0.3px; }
  .brand .rc { color:var(--red); }
  .sep { flex:1; }
  select, button {
    background:#0c0c0c; color:var(--fg); border:1px solid var(--border); border-radius:8px;
    padding:8px 10px; font:inherit;
  }
  select:focus { outline:none; border-color:var(--accent); }
  .scope-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .combo { position:relative; }
  .combo input {
    background:#0c0c0c; color:var(--fg); border:1px solid var(--border); border-radius:8px;
    padding:8px 10px; font:inherit; min-width:280px;
  }
  .combo input:focus { outline:none; border-color:var(--accent); }
  .combo-panel {
    position:absolute; top:calc(100% + 4px); left:0; right:0;
    background:var(--panel); border:1px solid var(--border); border-radius:8px;
    max-height:320px; overflow-y:auto; z-index:10;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .combo-option { padding:8px 12px; cursor:pointer; font-size:13px; border-bottom:1px solid #222; }
  .combo-option:last-child { border-bottom:0; }
  .combo-option:hover, .combo-option.active { background:#262626; }
  .combo-option .muted { color:var(--muted); font-size:11px; margin-left:6px; }
  .combo-empty { padding:10px 12px; color:var(--muted); font-size:13px; }
  .btn-ghost { background:transparent; color:var(--muted); cursor:pointer; border:1px solid var(--border); }
  .btn-ghost:hover { color:var(--fg); border-color:var(--fg); }

  main { padding:20px; max-width:1200px; margin:0 auto; }
  .empty {
    border:1px dashed var(--border); border-radius:12px; padding:40px; text-align:center; color:var(--muted);
  }
  .empty h2 { color:var(--fg); margin:0 0 8px; }

  .grid {
    display:grid; gap:14px;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    margin-bottom:20px;
  }
  .tile {
    background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px 18px;
    min-height:150px; display:flex; flex-direction:column; gap:6px;
  }
  .tile .title { margin:0; font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.8px; }
  .tile .body { font-size:13px; line-height:1.45; color:var(--muted); flex:1; display:flex; flex-direction:column; justify-content:center; }
  .tile .body h3 { margin:0 0 4px; font-size:38px; line-height:1.1; font-weight:700; color:var(--fg); letter-spacing:-0.5px; }
  .tile .body h3 + br { display:none; }
  .tile .body a { color:var(--accent); }
  .tile .body strong { color:var(--fg); }
  .spinner {
    width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--red);
    border-radius:50%; animation:spin 0.8s linear infinite; display:inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .chat {
    background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px;
  }
  .chat h2 { margin:0 0 12px; font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; font-weight:600; }
  .messages { display:flex; flex-direction:column; gap:12px; margin-bottom:12px; max-height:60vh; overflow:auto; }
  .msg { padding:12px 14px; border-radius:10px; white-space:pre-wrap; line-height:1.5; }
  .msg.user { background:#22272e; align-self:flex-end; max-width:85%; }
  .msg.bot { background:var(--panel2); border:1px solid var(--border); }
  .msg.bot.pending { color:var(--muted); }
  .ask-row { display:flex; gap:8px; }
  .ask-row textarea {
    flex:1; background:#0c0c0c; color:var(--fg); border:1px solid var(--border); border-radius:8px;
    padding:10px 12px; font:inherit; resize:vertical; min-height:44px; max-height:200px;
  }
  .ask-row textarea:focus { outline:none; border-color:var(--accent); }
  .ask-row button.send { background:var(--red); color:#fff; border:0; min-width:84px; }
  .ask-row button.send:disabled { opacity:0.55; cursor:progress; }

  footer { text-align:center; color:var(--muted); font-size:12px; padding:24px; }

  /* Markdown-ish */
  .body code, .msg code { background:#0c0c0c; padding:1px 5px; border-radius:4px; font-size:13px; }
  .body pre, .msg pre { background:#0c0c0c; padding:10px; border-radius:6px; overflow:auto; font-size:13px; }
  .body table, .msg table { border-collapse:collapse; margin:8px 0; font-size:13px; }
  .body th, .body td, .msg th, .msg td { border:1px solid var(--border); padding:4px 8px; text-align:left; }
</style>
</head>
<body>
<header>
  <div class="brand"><span class="rc">Red Cross</span> Intel</div>
  <div class="scope-row">
    <select id="scopeType">
      <option value="division">Division</option>
      <option value="region">Region</option>
      <option value="chapter">Chapter</option>
    </select>
    <div class="combo">
      <input id="scopeNameInput" type="text" placeholder="Loading…" autocomplete="off" spellcheck="false" />
      <div id="scopeNamePanel" class="combo-panel" hidden></div>
    </div>
  </div>
  <div class="sep"></div>
  <button class="btn-ghost" id="logout">Sign out</button>
</header>

<main>
  <div id="empty" class="empty">
    <h2>Pick a scope</h2>
    <p>Select a division, region, or chapter above to load a briefing dashboard. Then ask anything below.</p>
  </div>

  <div id="dashboard" class="grid" hidden></div>

  <section id="chatSection" class="chat" hidden>
    <h2>Ask anything — scoped to your selection</h2>
    <div id="messages" class="messages"></div>
    <form id="askForm" class="ask-row">
      <textarea id="q" placeholder="e.g. Which counties should we prioritize for hurricane pre-positioning?" rows="2" required></textarea>
      <button class="send" type="submit" id="sendBtn">Ask</button>
    </form>
  </section>
</main>

<footer>Alpha · powered by <code>explorer.jbf.com/api/smart-query</code></footer>

<script>
// ───── Gate: ensure authed ───────────────────────────────────────────────────
(async () => {
  const r = await fetch("/api/me", { cache: "no-store" });
  if (!r.ok) location.href = "/login?next=" + encodeURIComponent(location.pathname + location.search);
})();

// ───── Minimal markdown renderer ─────────────────────────────────────────────
function mdToHtml(md) {
  if (!md) return "";
  const esc = (s) => s.replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
  let out = esc(md);
  out = out.replace(/```([\s\S]*?)```/g, (_, c) => `<pre>${c.trim()}</pre>`);
  out = out.replace(/`([^`]+)`/g, "<code>$1</code>");
  out = out.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  out = out.replace(/\*(.+?)\*/g, "<em>$1</em>");
  out = out.replace(/^### (.+)$/gm, "<h4>$1</h4>");
  out = out.replace(/^## (.+)$/gm, "<h3>$1</h3>");
  out = out.replace(/^# (.+)$/gm, "<h3>$1</h3>");
  return out.replace(/\n/g, "<br>");
}

// ───── Scope loading ─────────────────────────────────────────────────────────
let scopes = null;
let scopeList = [];         // current filtered view
let activeIndex = -1;
const scopeType = document.getElementById("scopeType");
const scopeInput = document.getElementById("scopeNameInput");
const scopePanel = document.getElementById("scopeNamePanel");
const empty = document.getElementById("empty");
const dashboard = document.getElementById("dashboard");
const chatSection = document.getElementById("chatSection");

async function loadScopes() {
  const r = await fetch("/api/scopes");
  if (!r.ok) {
    scopeInput.placeholder = "Error loading scopes";
    return;
  }
  scopes = await r.json();
  onScopeTypeChange();
}

function currentList() {
  const t = scopeType.value;
  return scopes?.[t + "s"] || [];
}

function onScopeTypeChange() {
  const t = scopeType.value;
  scopeList = currentList();
  scopeInput.value = "";
  scopeInput.placeholder = `Search ${scopeList.length} ${t}${scopeList.length === 1 ? "" : "s"}…`;
  hidePanel();
  // clear dashboard when switching type
  empty.hidden = false;
  dashboard.hidden = true;
  chatSection.hidden = true;
}

function renderPanel(q) {
  const qq = (q || "").trim().toLowerCase();
  const matches = qq
    ? scopeList.map((s, i) => ({ ...s, _i: i })).filter(s => s.name.toLowerCase().includes(qq))
    : scopeList.map((s, i) => ({ ...s, _i: i }));
  if (!matches.length) {
    scopePanel.innerHTML = `<div class="combo-empty">No matches</div>`;
    scopePanel.hidden = false;
    activeIndex = -1;
    return;
  }
  const t = scopeType.value;
  const sub = (s) => t === "chapter" ? ` <span class="muted">· ${s.region || ""}</span>`
                   : t === "region"  ? ` <span class="muted">· ${s.division || ""}</span>`
                   : "";
  scopePanel.innerHTML = matches.slice(0, 300).map((s, idx) =>
    `<div class="combo-option${idx === 0 ? " active" : ""}" data-i="${s._i}">${s.name}${sub(s)}</div>`
  ).join("");
  scopePanel.hidden = false;
  activeIndex = 0;
}

function hidePanel() {
  scopePanel.hidden = true;
  activeIndex = -1;
}

function pickScope(i) {
  const s = scopeList[i];
  if (!s) return;
  scopeInput.value = s.name;
  hidePanel();
  activateScope({ type: scopeType.value, name: s.name, code: s.code, region: s.region, division: s.division });
}

scopeType.addEventListener("change", onScopeTypeChange);

scopeInput.addEventListener("focus", () => renderPanel(scopeInput.value));
scopeInput.addEventListener("input", () => renderPanel(scopeInput.value));
scopeInput.addEventListener("blur", () => setTimeout(hidePanel, 150));

scopeInput.addEventListener("keydown", (e) => {
  if (scopePanel.hidden) return;
  const options = scopePanel.querySelectorAll(".combo-option");
  if (e.key === "ArrowDown") {
    e.preventDefault();
    activeIndex = Math.min(activeIndex + 1, options.length - 1);
    options.forEach((el, i) => el.classList.toggle("active", i === activeIndex));
    options[activeIndex]?.scrollIntoView({ block: "nearest" });
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    activeIndex = Math.max(activeIndex - 1, 0);
    options.forEach((el, i) => el.classList.toggle("active", i === activeIndex));
    options[activeIndex]?.scrollIntoView({ block: "nearest" });
  } else if (e.key === "Enter") {
    e.preventDefault();
    const el = options[activeIndex];
    if (el) pickScope(Number(el.dataset.i));
  } else if (e.key === "Escape") {
    hidePanel();
    scopeInput.blur();
  }
});

scopePanel.addEventListener("mousedown", (e) => {
  const el = e.target.closest(".combo-option");
  if (!el) return;
  e.preventDefault();
  pickScope(Number(el.dataset.i));
});

// ───── Dashboard tiles ───────────────────────────────────────────────────────
const TILES = [
  { key: "vuln",   title: "Counties in worst 20% nationally", prompt: "Using supabase_sql on county_rankings: (1) compute the 80th percentile of pct_struggling across ALL counties nationwide (no scope filter); (2) count counties IN SCOPE where pct_struggling >= that percentile; (3) identify the scope county with the highest pct_struggling. Respond with EXACTLY three lines, no preamble, no code fence:\n## <N>\ncounties in worst 20% nationally (struggling)\nTop: <county>, <state> (<pct>%)" },
  { key: "hazard", title: "Leading hazard (avg risk)",  prompt: "Using supabase_sql on county_rankings, compute AVG of each: hurricane_risk, wildfire_risk, flood_risk, coastal_flood_risk, tornado_risk, earthquake_risk, heat_wave_risk, winter_storm_risk across scope counties. Pick the hazard with the highest average (scores are 0-100). Find the county with the highest value of that specific hazard_risk column. Respond with EXACTLY three lines, no preamble:\n## <Hazard name, e.g. Hurricane>\navg risk <X.X> / 100\nLead: <county>, <state> (<score>)" },
  { key: "alice",  title: "ALICE + poverty households", prompt: "Using supabase_sql, for counties in scope compute the sum of (pct_struggling * population / 100) as total struggling households. Find the top county by that same calculation. Respond with EXACTLY three lines, no preamble:\n## <total, rounded, with commas>\nALICE + poverty households\nTop: <county>, <state> (<count, rounded>)" },
  { key: "fema",   title: "FEMA declarations (since 2020)", prompt: "Using supabase_sql on fema_declarations, count total declarations covering any county in scope since 2020, and identify the single most common incident_type. Respond with EXACTLY three lines, no preamble:\n## <N>\nFEMA declarations since 2020\nMost common: <incident_type>" },
  { key: "fire",   title: "Fires without RC response (2024)", prompt: "Using agol_query on the flare_fire_incidents layer, filter to Master_Label = 'No RC Notification' and incidents in CY2024 whose county belongs to this scope. Count total, name the chapter (within scope) with the most. Respond with EXACTLY three lines, no preamble:\n## <N>\nfires w/o RC notification (CY2024)\nWorst chapter: <chapter name>" },
];

function cacheKey(scope, tileKey) {
  return `intel:tile:v3:${scope.type}:${scope.code || scope.name}:${tileKey}`;
}

function chatCacheKey(scope) {
  return `intel:chat:${scope.type}:${scope.code || scope.name}`;
}

async function runTile(scope, tile) {
  const host = document.querySelector(`#tile-${tile.key} .body`);
  const cached = localStorage.getItem(cacheKey(scope, tile.key));
  if (cached) {
    host.innerHTML = mdToHtml(cached);
    return;
  }
  host.innerHTML = `<span class="spinner"></span> Thinking…`;
  try {
    const r = await fetch("/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: tile.prompt, scope }),
    });
    if (!r.ok) {
      host.innerHTML = `<em style="color:#ff8080">Error ${r.status}</em>`;
      return;
    }
    const j = await r.json();
    host.innerHTML = mdToHtml(j.answer || "(no answer)");
    if (j.answer) localStorage.setItem(cacheKey(scope, tile.key), j.answer);
  } catch (e) {
    host.innerHTML = `<em style="color:#ff8080">${e.message}</em>`;
  }
}

function renderDashboardSkeleton(scope) {
  dashboard.innerHTML = TILES.map(t => `
    <div class="tile" id="tile-${t.key}">
      <div class="title">${t.title}</div>
      <div class="body"><span class="spinner"></span></div>
    </div>
  `).join("");
}

// ───── Chat ──────────────────────────────────────────────────────────────────
const messagesEl = document.getElementById("messages");
const askForm = document.getElementById("askForm");
const qEl = document.getElementById("q");
const sendBtn = document.getElementById("sendBtn");
let currentScope = null;
let history = [];

function renderHistory() {
  messagesEl.innerHTML = history.map(m =>
    `<div class="msg ${m.role}${m.pending ? " pending" : ""}">${m.role === "user" ? m.text.replace(/</g,"&lt;") : mdToHtml(m.text)}</div>`
  ).join("");
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function loadChat(scope) {
  const raw = localStorage.getItem(chatCacheKey(scope));
  history = raw ? JSON.parse(raw) : [];
  renderHistory();
}

function saveChat(scope) {
  localStorage.setItem(chatCacheKey(scope), JSON.stringify(history.slice(-30)));
}

askForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  if (!currentScope) return;
  const text = qEl.value.trim();
  if (!text) return;
  qEl.value = "";
  sendBtn.disabled = true;
  history.push({ role: "user", text });
  history.push({ role: "bot", text: "Thinking…", pending: true });
  renderHistory();
  try {
    const r = await fetch("/api/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: text, scope: currentScope }),
    });
    const j = await r.json();
    history.pop(); // remove pending
    if (!r.ok) {
      history.push({ role: "bot", text: `Error ${r.status}: ${j.error || "unknown"}` });
    } else {
      history.push({ role: "bot", text: j.answer || "(no answer)" });
    }
  } catch (x) {
    history.pop();
    history.push({ role: "bot", text: `Network error: ${x.message}` });
  }
  saveChat(currentScope);
  renderHistory();
  sendBtn.disabled = false;
});

// ───── Scope activation ──────────────────────────────────────────────────────
function activateScope(scope) {
  currentScope = scope;
  empty.hidden = true;
  dashboard.hidden = false;
  chatSection.hidden = false;
  renderDashboardSkeleton(scope);
  loadChat(scope);
  // Stagger to be gentle on the upstream
  TILES.forEach((t, i) => setTimeout(() => runTile(scope, t), i * 250));
}

// ───── Logout ────────────────────────────────────────────────────────────────
document.getElementById("logout").addEventListener("click", async () => {
  await fetch("/api/logout", { method: "POST" });
  location.href = "/login";
});

loadScopes();
</script>
</body>
</html>
